<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HXVP Studio</title>

    <!-- Brand fonts — matches hxvp.us editorial style -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=League+Gothic:wght@400&display=swap"
    />
    <!-- Inter + Roboto Condensed (Italic) — Portal Entry Gateway (/v2) -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;1,400&family=Roboto+Condensed:ital,wght@1,600;1,700&display=swap"
    />

    <!--
      SPA fallback decode (配套 public/404.html).
      把 ?/foo&bar 形式的 path 解码并 replaceState 回 /foo?bar.
      本地 dev 不会触发 (没有 ?/ 前缀). GH Pages 上从 404 跳回时会触发.
    -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(
            null, null, l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
