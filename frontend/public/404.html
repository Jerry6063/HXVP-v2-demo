<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HXVP Studio</title>
  <!--
    Single-Page App fallback for GitHub Pages.
    Adapted from rafgraph/spa-github-pages (MIT).

    GitHub Pages 不原生支持 SPA 路由 —— 直接访问 /production/login 会 404。
    这个脚本把请求路径编码到 query string,跳到根 index.html,
    根 index.html 里另一段脚本会解码并 replaceState 回正确路径。
  -->
  <script>
    // 单段 path 转 query。例如:
    //   /HXVP-v2-demo/production/login?foo=1
    // → /HXVP-v2-demo/?/production/login&foo=1
    var pathSegmentsToKeep = 1; // 保留 /HXVP-v2-demo 这一段(GH Pages 仓库名)

    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
</body>
</html>
